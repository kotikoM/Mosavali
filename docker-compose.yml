services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mosavali
      POSTGRES_PASSWORD: mosavali
      POSTGRES_DB: mosavali
    ports:
      - "5432:5432"
    volumes:
      - mosavali_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mosavali -d mosavali" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations

volumes:
  mosavali_pgdata: